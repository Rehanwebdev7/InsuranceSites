<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230A0A0A'/%3E%3Cpath d='M32 12 L48 18 V36 C48 46 32 54 32 54 C32 54 16 46 16 36 V18 Z' fill='none' stroke='%23D4AF37' stroke-width='3.5' stroke-linejoin='round'/%3E%3Cpath d='M24 32 L30 38 L42 26' stroke='%23D4AF37' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Your Trusted Insurance Partner. Get quotes for Two-Wheeler, Four-Wheeler, Commercial Vehicle, School Bus, and more." />
    <meta name="theme-color" content="#0A0A0A" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>MH Insurance - Trusted Vehicle Insurance Partner</title>
    <style>
      /* Hide Google Translate default bar */
      .goog-te-banner-frame, #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      body { top: 0 !important; }
      .skiptranslate { display: none !important; }

      /* Initial pre-React loader — noir + gold, vanishes once React mounts */
      html, body { background-color: #0A0A0A; margin: 0; }
      #initial-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; background: #0A0A0A; z-index: 9999;
        font-family: 'Playfair Display', Georgia, serif;
        opacity: 1; transition: opacity 0.4s ease;
      }
      #initial-loader.is-hidden { opacity: 0; pointer-events: none; }
      #initial-loader .ring {
        width: 56px; height: 56px;
        border-radius: 50%;
        border: 2px solid rgba(201, 169, 97, 0.18);
        border-top-color: #D4AF37;
        border-right-color: #C9A961;
        animation: bri-spin 0.9s linear infinite;
        box-shadow: 0 0 24px rgba(201, 169, 97, 0.25);
      }
      #initial-loader .word {
        color: #E5C770;
        font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase;
        font-weight: 600; font-style: italic;
      }
      #initial-loader .dot {
        width: 5px; height: 5px; border-radius: 50%; background: #D4AF37;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.7);
        animation: bri-pulse 1.4s ease-in-out infinite;
      }
      @keyframes bri-spin { to { transform: rotate(360deg); } }
      @keyframes bri-pulse {
        0%, 100% { opacity: 0.4; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div id="google_translate_element" style="display:none"></div>
    <div id="initial-loader">
      <div class="ring"></div>
      <span class="word">Loading the desk</span>
      <span class="dot"></span>
    </div>
    <div id="root"></div>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide pre-React loader once React's #root has mounted children.
      (function () {
        var root = document.getElementById('root');
        var loader = document.getElementById('initial-loader');
        if (!root || !loader) return;
        var hide = function () {
          loader.classList.add('is-hidden');
          setTimeout(function () { loader.parentNode && loader.parentNode.removeChild(loader); }, 450);
        };
        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            observer.disconnect();
            hide();
          }
        });
        observer.observe(root, { childList: true });
        // Safety net — bail after 8s no matter what
        setTimeout(function () { observer.disconnect(); hide(); }, 8000);
      })();
    </script>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,mr,ur',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>

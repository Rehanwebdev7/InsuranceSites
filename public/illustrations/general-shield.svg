<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="shBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="shOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="shGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5C770"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
    <linearGradient id="shInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#C9A961"/>
    </linearGradient>
    <linearGradient id="laurelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C4A1D"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="100" rx="100" ry="70" fill="url(#shBlob)" opacity="0.95"/>

  <!-- Laurel wreath background -->
  <g opacity="0.85">
    <path d="M62 96 Q42 78 50 50" stroke="url(#laurelGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="58" cy="88" rx="4" ry="2.5" fill="url(#laurelGrad)" transform="rotate(-30 58 88)"/>
    <ellipse cx="50" cy="74" rx="4" ry="2.5" fill="url(#laurelGrad)" transform="rotate(-45 50 74)"/>
    <ellipse cx="46" cy="60" rx="4" ry="2.5" fill="url(#laurelGrad)" transform="rotate(-65 46 60)"/>
    <path d="M178 96 Q198 78 190 50" stroke="url(#laurelGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="182" cy="88" rx="4" ry="2.5" fill="url(#laurelGrad)" transform="rotate(30 182 88)"/>
    <ellipse cx="190" cy="74" rx="4" ry="2.5" fill="url(#laurelGrad)" transform="rotate(45 190 74)"/>
    <ellipse cx="194" cy="60" rx="4" ry="2.5" fill="url(#laurelGrad)" transform="rotate(65 194 60)"/>
  </g>

  <!-- Outer shield -->
  <path d="M120 22 L184 38 L184 90 Q184 132 120 158 Q56 132 56 90 L56 38 Z" fill="url(#shOuter)"/>
  <!-- Mid shield (gold) -->
  <path d="M120 30 L176 44 L176 88 Q176 124 120 148 Q64 124 64 88 L64 44 Z" fill="url(#shGold)"/>
  <!-- Inner shield -->
  <path d="M120 40 L166 52 L166 86 Q166 116 120 138 Q74 116 74 86 L74 52 Z" fill="url(#shInner)"/>

  <!-- Center insignia: large gold check (subtle pulse glow) -->
  <g transform="translate(120 90)">
    <circle r="28" fill="#D4AF37" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="22;32;22" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="22" fill="url(#shGold)"/>
    <circle r="22" fill="none" stroke="#0A0A0A" stroke-width="2"/>
    <circle r="18" fill="none" stroke="#FDFAF1" stroke-width="0.8" opacity="0.7"/>
    <path d="M-10 0 L-3 8 L11 -8" stroke="#0A0A0A" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Top crest mini -->
  <path d="M108 32 L120 22 L132 32 L120 42 Z" fill="url(#shGold)" stroke="#0A0A0A" stroke-width="1.2"/>
  <circle cx="120" cy="32" r="2.5" fill="#0A0A0A"/>

  <!-- Banner ribbon underneath -->
  <path d="M76 152 L120 162 L164 152 L160 168 L120 172 L80 168 Z" fill="url(#shOuter)"/>
  <path d="M76 152 L80 168 L72 162 Z" fill="#0A0A0A"/>
  <path d="M164 152 L160 168 L168 162 Z" fill="#0A0A0A"/>
  <text x="120" y="166" font-family="serif" font-style="italic" font-size="9" fill="#E5C770" text-anchor="middle" font-weight="700">PROTECTED</text>

  <!-- Sparkles -->
  <circle cx="22" cy="36" r="2" fill="#D4AF37"/>
  <circle cx="218" cy="42" r="1.6" fill="#C9A961"/>
  <circle cx="20" cy="120" r="1.4" fill="#E5C770"/>
  <circle cx="222" cy="128" r="1.6" fill="#D4AF37"/>
  <path d="M30 60 L36 60 M33 57 L33 63" stroke="#C9A961" stroke-width="1" stroke-linecap="round"/>
  <path d="M210 76 L216 76 M213 73 L213 79" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>
</svg>

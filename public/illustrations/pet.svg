<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="petBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="petBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
    <linearGradient id="petBelly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#E5C770"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="115" rx="105" ry="55" fill="url(#petBlob)" opacity="0.95"/>
  <ellipse cx="120" cy="156" rx="50" ry="4" fill="#0A0A0A" opacity="0.14"/>

  <!-- Body -->
  <ellipse cx="120" cy="120" rx="48" ry="34" fill="url(#petBody)"/>
  <!-- Belly -->
  <ellipse cx="120" cy="128" rx="34" ry="20" fill="url(#petBelly)"/>

  <!-- Front legs -->
  <ellipse cx="100" cy="150" rx="8" ry="6" fill="#5C4A1D"/>
  <ellipse cx="140" cy="150" rx="8" ry="6" fill="#5C4A1D"/>
  <!-- Paw pads -->
  <circle cx="98" cy="150" r="1.2" fill="#0A0A0A"/>
  <circle cx="103" cy="150" r="1.2" fill="#0A0A0A"/>
  <circle cx="138" cy="150" r="1.2" fill="#0A0A0A"/>
  <circle cx="143" cy="150" r="1.2" fill="#0A0A0A"/>

  <!-- Ears -->
  <path d="M82 80 Q72 56 78 50 Q92 52 96 80 Z" fill="url(#petBody)"/>
  <path d="M158 80 Q168 56 162 50 Q148 52 144 80 Z" fill="url(#petBody)"/>
  <!-- Ear inner -->
  <path d="M86 76 Q82 60 86 56 Q92 58 92 76 Z" fill="#5C4A1D" opacity="0.75"/>
  <path d="M154 76 Q158 60 154 56 Q148 58 148 76 Z" fill="#5C4A1D" opacity="0.75"/>

  <!-- Head -->
  <ellipse cx="120" cy="92" rx="40" ry="36" fill="url(#petBody)"/>
  <!-- Snout -->
  <ellipse cx="120" cy="104" rx="20" ry="14" fill="url(#petBelly)"/>

  <!-- Eyes -->
  <ellipse cx="106" cy="86" rx="5" ry="5.5" fill="#FDFAF1"/>
  <circle cx="106" cy="88" r="3.5" fill="#0A0A0A"/>
  <circle cx="107" cy="86" r="1.2" fill="#FDFAF1"/>

  <ellipse cx="134" cy="86" rx="5" ry="5.5" fill="#FDFAF1"/>
  <circle cx="134" cy="88" r="3.5" fill="#0A0A0A"/>
  <circle cx="135" cy="86" r="1.2" fill="#FDFAF1"/>

  <!-- Nose -->
  <ellipse cx="120" cy="100" rx="5" ry="3.5" fill="#0A0A0A"/>
  <!-- Nose highlight -->
  <ellipse cx="119" cy="99" rx="1.4" ry="1" fill="#FDFAF1" opacity="0.7"/>

  <!-- Mouth -->
  <path d="M120 104 L120 112 M114 112 Q120 116 126 112" stroke="#0A0A0A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Tongue hint -->
  <path d="M118 113 Q120 117 122 113" fill="#C9A961"/>

  <!-- Whiskers -->
  <line x1="98" y1="106" x2="86" y2="104" stroke="#0A0A0A" stroke-width="0.8"/>
  <line x1="98" y1="110" x2="86" y2="112" stroke="#0A0A0A" stroke-width="0.8"/>
  <line x1="142" y1="106" x2="154" y2="104" stroke="#0A0A0A" stroke-width="0.8"/>
  <line x1="142" y1="110" x2="154" y2="112" stroke="#0A0A0A" stroke-width="0.8"/>

  <!-- Collar -->
  <path d="M86 120 Q120 130 154 120" stroke="#0A0A0A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M86 120 Q120 130 154 120" stroke="#C9A961" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Collar tag -->
  <circle cx="120" cy="132" r="5" fill="url(#petBody)" stroke="#0A0A0A" stroke-width="1.2"/>
  <text x="120" y="135" font-family="serif" font-size="6" fill="#0A0A0A" text-anchor="middle" font-weight="700">B</text>

  <!-- Tail -->
  <path d="M168 110 Q186 96 196 80 Q200 76 198 80" stroke="url(#petBody)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M168 110 Q186 96 196 80" stroke="#5C4A1D" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Sparkles -->
  <circle cx="22" cy="50" r="2" fill="#D4AF37"/>
  <circle cx="220" cy="46" r="1.6" fill="#C9A961"/>
  <circle cx="20" cy="120" r="1.4" fill="#E5C770"/>
  <circle cx="220" cy="130" r="1.6" fill="#D4AF37"/>
  <path d="M40 26 L46 26 M43 23 L43 29" stroke="#C9A961" stroke-width="1" stroke-linecap="round"/>
</svg>

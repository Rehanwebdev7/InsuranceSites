<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="healthBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
    <linearGradient id="heartShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
    <linearGradient id="stethGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="100" rx="100" ry="70" fill="url(#healthBlob)" opacity="0.95"/>

  <!-- Heart shadow / depth + heart body — together pulsing -->
  <g style="transform-origin: 120px 90px; transform-box: fill-box;">
    <path d="M122 158 C 78 122 50 96 50 64 C 50 44 66 32 84 32 C 98 32 112 42 122 60 C 132 42 146 32 160 32 C 178 32 194 44 194 64 C 194 96 166 122 122 158 Z" fill="url(#heartShadow)" transform="translate(2 4)"/>
    <path d="M120 156 C 76 120 48 94 48 62 C 48 42 64 30 82 30 C 96 30 110 40 120 58 C 130 40 144 30 158 30 C 176 30 192 42 192 62 C 192 94 164 120 120 156 Z" fill="url(#heartGrad)"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.06;1;1.04;1" keyTimes="0;0.18;0.32;0.5;1" dur="1.6s" repeatCount="indefinite" additive="sum"/>
  </g>
  <!-- Heart highlight -->
  <path d="M68 50 Q72 36 86 36 Q98 38 104 50" stroke="#FDFAF1" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Heart inner glow -->
  <path d="M120 140 C 88 110 64 88 64 64 C 64 50 76 40 88 40 C 100 40 112 50 120 64 C 128 50 140 40 152 40 C 164 40 176 50 176 64 C 176 88 152 110 120 140 Z" fill="none" stroke="#E5C770" stroke-width="1.5" opacity="0.6"/>

  <!-- Medical cross emblem in center -->
  <rect x="108" y="76" width="24" height="42" rx="3" fill="#FDFAF1"/>
  <rect x="96" y="88" width="48" height="18" rx="3" fill="#FDFAF1"/>
  <rect x="108" y="76" width="24" height="42" rx="3" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
  <rect x="96" y="88" width="48" height="18" rx="3" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>

  <!-- Stethoscope draped across -->
  <path d="M28 110 Q40 130 60 132 Q80 132 90 120" stroke="url(#stethGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="28" cy="108" r="8" fill="url(#stethGrad)"/>
  <circle cx="28" cy="108" r="5" fill="#C9A961"/>
  <circle cx="28" cy="108" r="2" fill="#0A0A0A"/>
  <!-- Other ear bud -->
  <line x1="28" y1="108" x2="22" y2="100" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="100" x2="20" y2="92" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="20" cy="92" rx="2.5" ry="2" fill="#1A1A1A"/>

  <!-- Pulse line -->
  <path d="M204 90 L210 90 L214 78 L218 102 L222 90 L228 90" stroke="#0A0A0A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkles -->
  <circle cx="34" cy="36" r="2.5" fill="#D4AF37"/>
  <circle cx="208" cy="40" r="2" fill="#C9A961"/>
  <circle cx="216" cy="56" r="1.5" fill="#E5C770"/>
  <circle cx="22" cy="160" r="1.8" fill="#D4AF37"/>
  <circle cx="222" cy="148" r="1.6" fill="#C9A961"/>
  <path d="M40 162 L46 162 M43 159 L43 165" stroke="#C9A961" stroke-width="1.2" stroke-linecap="round"/>
</svg>

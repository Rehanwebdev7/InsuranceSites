    <rect x="118" y="100" width="20" height="6" fill="url(#bizGlass)" opacity="0.92"/>
    <rect x="90" y="110" width="20" height="6" fill="url(#bizGlass)" opacity="0.92"/>
    <rect x="118" y="110" width="20" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="90" y="120" width="20" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="118" y="120" width="20" height="6" fill="url(#bizGlass)" opacity="0.92"/>
    <rect x="90" y="130" width="20" height="6" fill="url(#bizGlass)" opacity="0.92"/>
    <rect x="118" y="130" width="20" height="6" fill="url(#bizGlass)" opacity="0.78"/>

  <line x1="114" y1="48" x2="114" y2="138" stroke="#0A0A0A" stroke-width="0.8"/>

  <!-- Entrance -->
  <path d="M104 152 L104 138 L136 138 L136 152 Z" fill="#0A0A0A"/>
  <rect x="118" y="140" width="4" height="12" fill="#D4AF37" opacity="0.85"/>


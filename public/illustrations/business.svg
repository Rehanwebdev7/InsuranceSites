    <rect x="154" y="70" width="40" height="6" fill="url(#bizGlass)" opacity="0.95"/>
    <rect x="154" y="80" width="40" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="154" y="90" width="40" height="6" fill="url(#bizGlass)" opacity="0.95"/>
    <rect x="154" y="100" width="40" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="154" y="110" width="40" height="6" fill="url(#bizGlass)" opacity="0.95"/>
    <rect x="154" y="120" width="40" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="154" y="130" width="40" height="6" fill="url(#bizGlass)" opacity="0.95"/>
    <rect x="154" y="140" width="40" height="6" fill="url(#bizGlass)" opacity="0.78"/>
  </g>
  <line x1="174" y1="68" x2="174" y2="148" stroke="#0A0A0A" stroke-width="0.8"/>

  <!-- Sparkles -->
  <circle cx="20" cy="50" r="2" fill="#D4AF37"/>
  <circle cx="220" cy="60" r="1.8" fill="#C9A961"/>
  <circle cx="22" cy="120" r="1.4" fill="#E5C770"/>
  <path d="M210 30 L216 30 M213 27 L213 33" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>

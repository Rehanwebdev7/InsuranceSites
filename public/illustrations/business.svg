<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="bizBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="bizTower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="bizGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5C770"/>
      <stop offset="100%" stop-color="#C9A961"/>
    </linearGradient>
    <linearGradient id="bizCrown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="125" rx="108" ry="50" fill="url(#bizBlob)" opacity="0.95"/>
  <ellipse cx="120" cy="156" rx="80" ry="4" fill="#0A0A0A" opacity="0.14"/>

  <!-- Left tower (shorter) -->
  <rect x="36" y="74" width="44" height="78" fill="url(#bizTower)"/>
  <rect x="34" y="72" width="48" height="6" fill="#0A0A0A"/>
  <!-- Glass panels -->
  <g>
    <rect x="40" y="82" width="36" height="6" fill="url(#bizGlass)" opacity="0.95"/>
    <rect x="40" y="92" width="36" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="40" y="102" width="36" height="6" fill="url(#bizGlass)" opacity="0.95"/>
    <rect x="40" y="112" width="36" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="40" y="122" width="36" height="6" fill="url(#bizGlass)" opacity="0.95"/>
    <rect x="40" y="132" width="36" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="40" y="142" width="36" height="6" fill="url(#bizGlass)" opacity="0.95"/>
  </g>
  <!-- Vertical mullions -->

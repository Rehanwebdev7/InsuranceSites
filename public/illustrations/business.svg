    <rect x="90" y="60" width="20" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="118" y="60" width="20" height="6" fill="url(#bizGlass)" opacity="0.92"/>
    <rect x="90" y="70" width="20" height="6" fill="url(#bizGlass)" opacity="0.92"/>
    <rect x="118" y="70" width="20" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="90" y="80" width="20" height="6" fill="url(#bizGlass)" opacity="0.78"/>
    <rect x="118" y="80" width="20" height="6" fill="url(#bizGlass)" opacity="0.92"/>
    <rect x="90" y="90" width="20" height="6" fill="url(#bizGlass)" opacity="0.92"/>
    <rect x="118" y="90" width="20" height="6" fill="url(#bizGlass)" opacity="0.78"/>

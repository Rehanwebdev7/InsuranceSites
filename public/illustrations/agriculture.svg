<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="agBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="wheatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5C770"/>
      <stop offset="60%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C4A1D"/>
      <stop offset="100%" stop-color="#2E2510"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="115" rx="106" ry="55" fill="url(#agBlob)" opacity="0.95"/>
  <ellipse cx="120" cy="156" rx="56" ry="4" fill="#0A0A0A" opacity="0.14"/>

  <!-- Field hint at bottom -->
  <path d="M40 156 Q80 150 120 156 Q160 150 200 156" stroke="#8B6F2C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M50 152 Q90 148 130 152 Q170 148 200 152" stroke="#5C4A1D" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Center stem -->
  <line x1="120" y1="156" x2="120" y2="44" stroke="#5C4A1D" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wheat grain ear (top) -->
  <g transform="translate(120 60)">
    <ellipse cx="0" cy="-14" rx="3" ry="6" fill="url(#wheatGrad)"/>
    <ellipse cx="-5" cy="-6" rx="3" ry="5" fill="url(#wheatGrad)" transform="rotate(-25)"/>
    <ellipse cx="5" cy="-6" rx="3" ry="5" fill="url(#wheatGrad)" transform="rotate(25)"/>
    <ellipse cx="-7" cy="2" rx="3.2" ry="5.5" fill="url(#wheatGrad)" transform="rotate(-30)"/>
    <ellipse cx="7" cy="2" rx="3.2" ry="5.5" fill="url(#wheatGrad)" transform="rotate(30)"/>
    <ellipse cx="-8" cy="10" rx="3.5" ry="6" fill="url(#wheatGrad)" transform="rotate(-35)"/>
    <ellipse cx="8" cy="10" rx="3.5" ry="6" fill="url(#wheatGrad)" transform="rotate(35)"/>
    <!-- Awns / bristles -->
    <line x1="0" y1="-22" x2="-3" y2="-30" stroke="#8B6F2C" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="0" y1="-22" x2="0" y2="-32" stroke="#8B6F2C" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="0" y1="-22" x2="3" y2="-30" stroke="#8B6F2C" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-7" y1="-12" x2="-13" y2="-18" stroke="#8B6F2C" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="7" y1="-12" x2="13" y2="-18" stroke="#8B6F2C" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Side wheat ears (left) -->
  <g transform="translate(86 92) rotate(-22)">
    <ellipse cx="0" cy="-12" rx="2.6" ry="5" fill="url(#wheatGrad)"/>
    <ellipse cx="-4" cy="-5" rx="2.5" ry="4.5" fill="url(#wheatGrad)" transform="rotate(-25)"/>
    <ellipse cx="4" cy="-5" rx="2.5" ry="4.5" fill="url(#wheatGrad)" transform="rotate(25)"/>
    <ellipse cx="-5" cy="3" rx="2.8" ry="5" fill="url(#wheatGrad)" transform="rotate(-30)"/>
    <ellipse cx="5" cy="3" rx="2.8" ry="5" fill="url(#wheatGrad)" transform="rotate(30)"/>
    <line x1="0" y1="-18" x2="0" y2="-25" stroke="#8B6F2C" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="-9" x2="-9" y2="-14" stroke="#8B6F2C" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="5" y1="-9" x2="9" y2="-14" stroke="#8B6F2C" stroke-width="0.7" stroke-linecap="round"/>
  </g>
  <line x1="120" y1="92" x2="86" y2="92" stroke="#5C4A1D" stroke-width="2" stroke-linecap="round"/>

  <!-- Side wheat ears (right) -->
  <g transform="translate(154 92) rotate(22)">
    <ellipse cx="0" cy="-12" rx="2.6" ry="5" fill="url(#wheatGrad)"/>
    <ellipse cx="-4" cy="-5" rx="2.5" ry="4.5" fill="url(#wheatGrad)" transform="rotate(-25)"/>
    <ellipse cx="4" cy="-5" rx="2.5" ry="4.5" fill="url(#wheatGrad)" transform="rotate(25)"/>
    <ellipse cx="-5" cy="3" rx="2.8" ry="5" fill="url(#wheatGrad)" transform="rotate(-30)"/>
    <ellipse cx="5" cy="3" rx="2.8" ry="5" fill="url(#wheatGrad)" transform="rotate(30)"/>
    <line x1="0" y1="-18" x2="0" y2="-25" stroke="#8B6F2C" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="-9" x2="-9" y2="-14" stroke="#8B6F2C" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="5" y1="-9" x2="9" y2="-14" stroke="#8B6F2C" stroke-width="0.7" stroke-linecap="round"/>
  </g>
  <line x1="120" y1="92" x2="154" y2="92" stroke="#5C4A1D" stroke-width="2" stroke-linecap="round"/>

  <!-- Lower side stems -->
  <g transform="translate(72 122) rotate(-30)">
    <ellipse cx="0" cy="-10" rx="2.4" ry="4.5" fill="url(#wheatGrad)"/>
    <ellipse cx="-3.5" cy="-3" rx="2.3" ry="4" fill="url(#wheatGrad)" transform="rotate(-25)"/>
    <ellipse cx="3.5" cy="-3" rx="2.3" ry="4" fill="url(#wheatGrad)" transform="rotate(25)"/>
    <line x1="0" y1="-15" x2="0" y2="-22" stroke="#8B6F2C" stroke-width="0.6" stroke-linecap="round"/>
  </g>
  <line x1="120" y1="122" x2="72" y2="122" stroke="#5C4A1D" stroke-width="1.6" stroke-linecap="round"/>

  <g transform="translate(168 122) rotate(30)">
    <ellipse cx="0" cy="-10" rx="2.4" ry="4.5" fill="url(#wheatGrad)"/>
    <ellipse cx="-3.5" cy="-3" rx="2.3" ry="4" fill="url(#wheatGrad)" transform="rotate(-25)"/>
    <ellipse cx="3.5" cy="-3" rx="2.3" ry="4" fill="url(#wheatGrad)" transform="rotate(25)"/>
    <line x1="0" y1="-15" x2="0" y2="-22" stroke="#8B6F2C" stroke-width="0.6" stroke-linecap="round"/>
  </g>
  <line x1="120" y1="122" x2="168" y2="122" stroke="#5C4A1D" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Leaves at base -->
  <path d="M120 140 Q102 134 92 140 Q104 144 118 142" fill="url(#leafGrad)"/>
  <path d="M120 140 Q138 134 148 140 Q136 144 122 142" fill="url(#leafGrad)"/>

  <!-- Ribbon binding -->
  <path d="M104 138 Q120 144 136 138 L138 146 Q120 152 102 146 Z" fill="#0A0A0A"/>
  <path d="M118 140 L122 140 L126 134 L114 134 Z" fill="#C9A961"/>

  <!-- Sparkles -->
  <circle cx="24" cy="40" r="2" fill="#D4AF37"/>
  <circle cx="218" cy="50" r="1.6" fill="#C9A961"/>
  <circle cx="22" cy="100" r="1.4" fill="#E5C770"/>
  <path d="M30 70 L36 70 M33 67 L33 73" stroke="#C9A961" stroke-width="1" stroke-linecap="round"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="bikeBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="bikeFairing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
    <linearGradient id="bikeFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <radialGradient id="bikeRim" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E5C770"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </radialGradient>
  </defs>
  <ellipse cx="120" cy="115" rx="105" ry="55" fill="url(#bikeBlob)" opacity="0.95"/>
  <ellipse cx="120" cy="150" rx="68" ry="5" fill="#0A0A0A" opacity="0.16"/>

  <!-- Rear wheel (rotating) -->
  <circle cx="60" cy="130" r="24" fill="#0A0A0A"/>
  <circle cx="60" cy="130" r="20" fill="#1A1A1A"/>
  <circle cx="60" cy="130" r="14" fill="url(#bikeRim)"/>
  <g transform="translate(60 130)" stroke="#0A0A0A" stroke-width="1.3">
    <g fill="none">
      <line x1="0" y1="-12" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="12" y2="0"/>
      <line x1="-8.5" y1="-8.5" x2="8.5" y2="8.5"/>
      <line x1="8.5" y1="-8.5" x2="-8.5" y2="8.5"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3.5s" repeatCount="indefinite"/>
    </g>
  </g>
  <circle cx="60" cy="130" r="3" fill="#0A0A0A"/>

  <!-- Front wheel (rotating) -->
  <circle cx="180" cy="130" r="24" fill="#0A0A0A"/>
  <circle cx="180" cy="130" r="20" fill="#1A1A1A"/>
  <circle cx="180" cy="130" r="14" fill="url(#bikeRim)"/>
  <g transform="translate(180 130)" stroke="#0A0A0A" stroke-width="1.3">
    <g fill="none">
      <line x1="0" y1="-12" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="12" y2="0"/>
      <line x1="-8.5" y1="-8.5" x2="8.5" y2="8.5"/>
      <line x1="8.5" y1="-8.5" x2="-8.5" y2="8.5"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3.5s" repeatCount="indefinite"/>
    </g>
  </g>
  <circle cx="180" cy="130" r="3" fill="#0A0A0A"/>

  <!-- Frame triangle -->
  <path d="M60 130 L100 78 L150 78 L180 130 L150 130 L100 130 Z" fill="none" stroke="url(#bikeFrame)" stroke-width="6" stroke-linejoin="round"/>
  <!-- Top tube + seat tube -->
  <line x1="100" y1="78" x2="150" y2="130" stroke="#1A1A1A" stroke-width="5"/>
  <line x1="150" y1="78" x2="100" y2="130" stroke="#1A1A1A" stroke-width="5" opacity="0.5"/>

  <!-- Fairing/tank -->
  <path d="M84 78 Q90 60 110 60 L142 60 Q156 64 158 78 L150 90 L100 90 Z" fill="url(#bikeFairing)"/>
  <path d="M88 78 Q94 64 110 62 L138 62" stroke="#FDFAF1" stroke-width="1.5" opacity="0.6"/>

  <!-- Seat -->
  <path d="M60 130 Q70 116 100 118 L100 124 Q70 124 64 132 Z" fill="#1A1A1A"/>

  <!-- Rear suspension -->
  <line x1="80" y1="120" x2="100" y2="100" stroke="#2A2A2A" stroke-width="3"/>

  <!-- Front fork -->
  <line x1="180" y1="130" x2="158" y2="78" stroke="#1A1A1A" stroke-width="4"/>
  <line x1="180" y1="130" x2="170" y2="84" stroke="#3A3A3A" stroke-width="2"/>

  <!-- Handlebars -->
  <path d="M150 64 L172 50 L186 56 L196 50" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <rect x="148" y="60" width="20" height="6" rx="2" fill="#0A0A0A"/>
  <!-- Handlebar grips -->
  <circle cx="194" cy="48" r="3.5" fill="#D4AF37"/>
  <circle cx="194" cy="48" r="1.5" fill="#0A0A0A"/>

  <!-- Mirror -->
  <line x1="184" y1="56" x2="176" y2="38" stroke="#1A1A1A" stroke-width="1.6" stroke-linecap="round"/>
  <ellipse cx="174" cy="36" rx="4" ry="3" fill="#E5C770"/>

  <!-- Headlight -->
  <ellipse cx="174" cy="78" rx="6" ry="4.5" fill="#E5C770"/>
  <ellipse cx="174" cy="78" rx="3" ry="2" fill="#FDFAF1"/>

  <!-- Exhaust -->
  <path d="M62 130 Q40 130 28 122 L24 116 L26 110 L34 114 L62 122" stroke="#1A1A1A" stroke-width="3" fill="#2A2A2A"/>

  <!-- Sparkles -->
  <circle cx="30" cy="48" r="2" fill="#D4AF37"/>
  <circle cx="210" cy="44" r="1.6" fill="#C9A961"/>
  <circle cx="220" cy="64" r="1.4" fill="#E5C770"/>
  <path d="M212 78 L218 78 M215 75 L215 81" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>
</svg>

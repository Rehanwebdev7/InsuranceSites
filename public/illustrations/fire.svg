<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="fireBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="bldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="flameOuter" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8B6F2C"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#FDFAF1"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#FDFAF1"/>
    </linearGradient>
    <linearGradient id="shieldFire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5C770"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="115" rx="106" ry="55" fill="url(#fireBlob)" opacity="0.95"/>
  <ellipse cx="120" cy="156" rx="60" ry="4" fill="#0A0A0A" opacity="0.14"/>

  <!-- Building -->
  <rect x="64" y="44" width="112" height="100" fill="url(#bldGrad)" rx="2"/>
  <!-- Top trim -->
  <rect x="62" y="42" width="116" height="6" fill="#0A0A0A"/>
  <!-- Antenna -->
  <line x1="120" y1="42" x2="120" y2="26" stroke="#0A0A0A" stroke-width="2"/>
  <circle cx="120" cy="24" r="2.5" fill="#D4AF37"/>

  <!-- Window grid -->
  <g fill="#E5C770">
    <rect x="74" y="56" width="14" height="14" rx="1"/>
    <rect x="96" y="56" width="14" height="14" rx="1"/>
    <rect x="118" y="56" width="14" height="14" rx="1"/>
    <rect x="140" y="56" width="14" height="14" rx="1"/>
    <rect x="162" y="56" width="14" height="14" rx="1" opacity="0.55"/>

    <rect x="74" y="78" width="14" height="14" rx="1" opacity="0.7"/>
    <rect x="96" y="78" width="14" height="14" rx="1"/>
    <rect x="118" y="78" width="14" height="14" rx="1" opacity="0.6"/>
    <rect x="140" y="78" width="14" height="14" rx="1"/>
    <rect x="162" y="78" width="14" height="14" rx="1"/>

    <rect x="74" y="100" width="14" height="14" rx="1"/>
    <rect x="96" y="100" width="14" height="14" rx="1" opacity="0.5"/>
    <rect x="118" y="100" width="14" height="14" rx="1"/>
    <rect x="140" y="100" width="14" height="14" rx="1" opacity="0.6"/>
    <rect x="162" y="100" width="14" height="14" rx="1"/>
  </g>

  <!-- Entrance -->
  <path d="M108 144 L108 124 Q108 116 120 116 Q132 116 132 124 L132 144 Z" fill="#0A0A0A"/>
  <line x1="120" y1="118" x2="120" y2="144" stroke="#3A3A3A" stroke-width="0.8"/>

  <!-- Flames flickering -->
  <g transform="translate(50 110)">
    <path d="M0 30 Q-12 20 -8 8 Q-2 12 4 4 Q8 14 14 8 Q12 18 18 22 Q14 30 6 32 Z" fill="url(#flameOuter)">
      <animate attributeName="d" values="M0 30 Q-12 20 -8 8 Q-2 12 4 4 Q8 14 14 8 Q12 18 18 22 Q14 30 6 32 Z; M0 30 Q-10 22 -6 10 Q-1 14 5 6 Q9 16 13 10 Q11 20 17 24 Q12 30 5 32 Z; M0 30 Q-12 20 -8 8 Q-2 12 4 4 Q8 14 14 8 Q12 18 18 22 Q14 30 6 32 Z" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M2 26 Q-4 18 -2 10 Q4 14 8 8 Q12 18 14 22 Q8 26 4 28 Z" fill="url(#flameInner)">
      <animate attributeName="opacity" values="0.7;1;0.8;1;0.7" dur="0.6s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(180 110)">
    <path d="M0 30 Q-12 20 -8 8 Q-2 12 4 4 Q8 14 14 8 Q12 18 18 22 Q14 30 6 32 Z" fill="url(#flameOuter)">
      <animate attributeName="d" values="M0 30 Q-12 20 -8 8 Q-2 12 4 4 Q8 14 14 8 Q12 18 18 22 Q14 30 6 32 Z; M0 30 Q-11 21 -7 9 Q-2 13 4 5 Q8 15 14 9 Q12 19 17 23 Q13 30 6 32 Z; M0 30 Q-12 20 -8 8 Q-2 12 4 4 Q8 14 14 8 Q12 18 18 22 Q14 30 6 32 Z" dur="0.9s" begin="0.2s" repeatCount="indefinite"/>
    </path>
    <path d="M2 26 Q-4 18 -2 10 Q4 14 8 8 Q12 18 14 22 Q8 26 4 28 Z" fill="url(#flameInner)">
      <animate attributeName="opacity" values="0.8;1;0.7;1;0.8" dur="0.7s" begin="0.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Protective shield overlay (top right) -->
  <g transform="translate(170 30)">
    <path d="M0 0 L26 8 L26 28 Q26 44 14 52 Q2 44 2 28 L2 8 Z" fill="url(#shieldFire)" stroke="#0A0A0A" stroke-width="1.5"/>
    <path d="M8 26 L13 32 L20 22" stroke="#0A0A0A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Sparkles -->
  <circle cx="22" cy="50" r="2" fill="#D4AF37"/>
  <circle cx="222" cy="58" r="1.6" fill="#C9A961"/>
  <circle cx="20" cy="160" r="1.4" fill="#E5C770"/>
  <path d="M30 30 L36 30 M33 27 L33 33" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>
</svg>

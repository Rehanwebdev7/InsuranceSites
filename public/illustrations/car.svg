<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="55%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="carWindow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5C770"/>
      <stop offset="100%" stop-color="#C9A961"/>
    </linearGradient>
    <linearGradient id="carBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <radialGradient id="rim" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E5C770"/>
      <stop offset="65%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </radialGradient>
  </defs>
  <!-- Bg blob -->
  <ellipse cx="120" cy="115" rx="105" ry="55" fill="url(#carBlob)" opacity="0.95"/>
  <!-- Ground shadow -->
  <ellipse cx="120" cy="148" rx="72" ry="6" fill="#0A0A0A" opacity="0.18"/>
  <!-- Rear wheel arch shadow -->
  <ellipse cx="58" cy="135" rx="20" ry="6" fill="#0A0A0A" opacity="0.10"/>
  <ellipse cx="174" cy="135" rx="20" ry="6" fill="#0A0A0A" opacity="0.10"/>
  <!-- Body lower -->
  <path d="M28 122 Q34 88 60 84 L98 78 Q120 64 144 66 L172 72 Q194 80 206 100 L212 122 Q214 132 208 134 L196 134 Q192 122 178 122 Q164 122 158 134 L82 134 Q76 122 62 122 Q48 122 44 134 L32 134 Q26 132 28 122 Z" fill="url(#carBody)"/>
  <!-- Body crease line -->
  <path d="M40 116 L208 116" stroke="#3A3A3A" stroke-width="1" opacity="0.6"/>
  <!-- Window glass -->
  <path d="M64 84 L98 76 Q120 64 144 66 L172 76 Q188 82 196 96 L194 110 L66 110 Z" fill="url(#carWindow)"/>
  <!-- Window mullion -->
  <line x1="118" y1="66" x2="118" y2="110" stroke="#1A1A1A" stroke-width="1.8"/>
  <!-- Window highlight stripes -->
  <path d="M70 90 L100 80" stroke="#FDFAF1" stroke-width="1.5" opacity="0.7"/>
  <path d="M126 80 L188 96" stroke="#FDFAF1" stroke-width="1.2" opacity="0.5"/>
  <!-- Side mirror -->
  <ellipse cx="62" cy="92" rx="3.5" ry="2.5" fill="#1A1A1A"/>
  <!-- Door handle -->
  <rect x="100" y="116" width="14" height="2" rx="1" fill="#E5C770"/>
  <!-- Headlight + taillight -->
  <ellipse cx="206" cy="108" rx="4" ry="2.5" fill="#E5C770"/>
  <ellipse cx="34" cy="110" rx="4" ry="2.5" fill="#D4AF37" opacity="0.8"/>
  <!-- Front bumper light -->
  <rect x="192" y="118" width="14" height="2.5" rx="1" fill="#C9A961" opacity="0.85"/>
  <rect x="34" y="118" width="14" height="2.5" rx="1" fill="#C9A961" opacity="0.7"/>
  <!-- Rear wheel (rotating spokes) -->
  <circle cx="60" cy="135" r="15" fill="#0A0A0A"/>
  <circle cx="60" cy="135" r="11" fill="#1A1A1A"/>
  <circle cx="60" cy="135" r="8" fill="url(#rim)"/>
  <g transform="translate(60 135)">
    <g>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#0A0A0A" stroke-width="1.3"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#0A0A0A" stroke-width="1.3"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#0A0A0A" stroke-width="1.3"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#0A0A0A" stroke-width="1.3"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>
  <circle cx="60" cy="135" r="2" fill="#0A0A0A"/>
  <!-- Front wheel (rotating spokes) -->
  <circle cx="176" cy="135" r="15" fill="#0A0A0A"/>
  <circle cx="176" cy="135" r="11" fill="#1A1A1A"/>
  <circle cx="176" cy="135" r="8" fill="url(#rim)"/>
  <g transform="translate(176 135)">
    <g>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#0A0A0A" stroke-width="1.3"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#0A0A0A" stroke-width="1.3"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#0A0A0A" stroke-width="1.3"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#0A0A0A" stroke-width="1.3"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>
  <circle cx="176" cy="135" r="2" fill="#0A0A0A"/>
  <!-- Twinkling sparkles -->
  <circle cx="32" cy="50" r="2.5" fill="#D4AF37">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="208" cy="48" r="2" fill="#C9A961">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="68" r="1.5" fill="#E5C770">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="80" r="1.5" fill="#D4AF37">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <path d="M28 60 L34 60 M31 57 L31 63" stroke="#C9A961" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M212 80 L218 80 M215 77 L215 83" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>
</svg>

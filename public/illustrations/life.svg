<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="lifeBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="umbrella" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
    <linearGradient id="umbrellaInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5C770"/>
      <stop offset="100%" stop-color="#C9A961"/>
    </linearGradient>
    <linearGradient id="lifeFamily" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="115" rx="105" ry="55" fill="url(#lifeBlob)" opacity="0.95"/>
  <ellipse cx="120" cy="158" rx="64" ry="4" fill="#0A0A0A" opacity="0.14"/>

  <!-- Umbrella canopy with gentle sway -->
  <g style="transform-origin: 120px 80px;">
    <animateTransform attributeName="transform" type="rotate" values="-2 120 80; 2 120 80; -2 120 80" dur="4.5s" repeatCount="indefinite"/>
  <path d="M120 24 Q44 24 36 80 L40 80 Q44 56 80 50 Q120 46 160 50 Q196 56 200 80 L204 80 Q196 24 120 24 Z" fill="url(#umbrella)"/>
  <!-- Inner segments -->
  <path d="M40 80 Q44 56 80 50 L80 80 Z" fill="url(#umbrellaInner)" opacity="0.95"/>
  <path d="M120 46 Q140 48 160 50 L160 80 L120 80 Z" fill="url(#umbrellaInner)" opacity="0.85"/>
  <path d="M80 50 Q100 46 120 46 L120 80 L80 80 Z" fill="url(#umbrella)" opacity="0.95"/>
  <path d="M160 50 Q180 54 200 80 L160 80 Z" fill="url(#umbrella)" opacity="0.85"/>
  <!-- Spokes / segment dividers -->
  <line x1="80" y1="50" x2="80" y2="80" stroke="#5C4A1D" stroke-width="0.8"/>
  <line x1="120" y1="46" x2="120" y2="80" stroke="#5C4A1D" stroke-width="0.8"/>
  <line x1="160" y1="50" x2="160" y2="80" stroke="#5C4A1D" stroke-width="0.8"/>
  <!-- Tip (gold finial) -->
  <circle cx="120" cy="22" r="4" fill="#E5C770"/>
  <circle cx="120" cy="22" r="2" fill="#D4AF37"/>
  <!-- Handle (curved) -->
  <path d="M120 80 L120 130 Q120 140 130 140 Q138 140 138 134" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- /umbrella sway group -->

  <!-- Family figures -->
  <!-- Father (left) -->
  <circle cx="62" cy="100" r="9" fill="url(#lifeFamily)"/>
  <path d="M48 142 Q48 116 62 114 Q76 116 76 142 Z" fill="url(#lifeFamily)"/>
  <!-- Father suit detail -->
  <line x1="62" y1="116" x2="62" y2="142" stroke="#3A3A3A" stroke-width="1"/>
  <circle cx="62" cy="124" r="0.8" fill="#D4AF37"/>
  <circle cx="62" cy="130" r="0.8" fill="#D4AF37"/>

  <!-- Child (center) -->
  <circle cx="100" cy="108" r="7" fill="url(#lifeFamily)"/>
  <path d="M88 142 Q88 122 100 120 Q112 122 112 142 Z" fill="url(#lifeFamily)"/>
  <!-- Child collar -->
  <path d="M94 122 L100 126 L106 122" stroke="#D4AF37" stroke-width="1.2" fill="none"/>

  <!-- Mother (with hair) -->
  <circle cx="138" cy="100" r="9" fill="url(#lifeFamily)"/>
  <!-- Hair -->
  <path d="M129 96 Q126 86 138 84 Q150 86 147 96" fill="url(#lifeFamily)"/>
  <path d="M124 142 Q124 116 138 114 Q152 116 152 142 Z" fill="url(#lifeFamily)"/>

  <!-- Eldest child / teen -->
  <circle cx="174" cy="106" r="8" fill="url(#lifeFamily)"/>
  <path d="M162 142 Q162 120 174 118 Q186 120 186 142 Z" fill="url(#lifeFamily)"/>

  <!-- Holding hands line (subtle) -->
  <path d="M76 132 Q88 130 88 132 M112 132 Q124 130 124 132 M152 132 Q162 130 162 132" stroke="#D4AF37" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Sparkles -->
  <circle cx="22" cy="50" r="2" fill="#D4AF37"/>
  <circle cx="222" cy="48" r="1.6" fill="#C9A961"/>
  <circle cx="20" cy="120" r="1.4" fill="#E5C770"/>
  <circle cx="226" cy="130" r="1.5" fill="#D4AF37"/>
  <path d="M30 32 L36 32 M33 29 L33 35" stroke="#C9A961" stroke-width="1" stroke-linecap="round"/>
</svg>

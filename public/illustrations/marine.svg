<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <defs>
    <linearGradient id="marBlob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#F5EBD3"/>
    </linearGradient>
    <linearGradient id="marHull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="marDeck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFAF1"/>
      <stop offset="100%" stop-color="#E5C770"/>
    </linearGradient>
    <linearGradient id="marWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#8B6F2C"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="100" rx="108" ry="68" fill="url(#marBlob)" opacity="0.95"/>

  <!-- Sky elements: sun/moon -->
  <circle cx="194" cy="40" r="14" fill="url(#marWater)" opacity="0.85"/>
  <circle cx="194" cy="40" r="14" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
  <line x1="194" y1="20" x2="194" y2="14" stroke="#C9A961" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="214" y1="40" x2="220" y2="40" stroke="#C9A961" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="180" y1="26" x2="176" y2="22" stroke="#C9A961" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="208" y1="26" x2="212" y2="22" stroke="#C9A961" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Birds -->
  <path d="M60 40 Q64 36 68 40 Q72 36 76 40" stroke="#0A0A0A" stroke-width="1.4" fill="none"/>
  <path d="M88 50 Q92 46 96 50 Q100 46 104 50" stroke="#0A0A0A" stroke-width="1.2" fill="none"/>

  <!-- Water -->
  <path d="M16 116 Q60 112 100 116 Q140 120 180 114 Q210 110 224 116 L224 144 L16 144 Z" fill="url(#marWater)" opacity="0.7"/>
  <path d="M16 116 Q60 112 100 116 Q140 120 180 114 Q210 110 224 116" stroke="#5C4A1D" stroke-width="1.2" fill="none"/>
  <path d="M16 124 Q60 120 100 124 Q140 128 180 122 Q210 118 224 124" stroke="#FDFAF1" stroke-width="0.8" fill="none" opacity="0.8"/>
  <path d="M30 132 Q56 130 84 132 M120 132 Q150 130 180 132" stroke="#FDFAF1" stroke-width="0.8" fill="none" opacity="0.7"/>

  <!-- Hull -->
  <path d="M50 102 L188 102 L172 132 L66 132 Z" fill="url(#marHull)"/>
  <!-- Deck top (waterline trim) -->
  <rect x="50" y="100" width="138" height="3" fill="#C9A961"/>
  <!-- Hull stripes -->
  <rect x="56" y="106" width="126" height="3" fill="#5C4A1D"/>
  <!-- Portholes -->
  <circle cx="74" cy="116" r="3" fill="#E5C770" stroke="#C9A961" stroke-width="0.6"/>
  <circle cx="92" cy="116" r="3" fill="#E5C770" stroke="#C9A961" stroke-width="0.6"/>
  <circle cx="110" cy="116" r="3" fill="#E5C770" stroke="#C9A961" stroke-width="0.6"/>
  <circle cx="128" cy="116" r="3" fill="#E5C770" stroke="#C9A961" stroke-width="0.6"/>
  <circle cx="146" cy="116" r="3" fill="#E5C770" stroke="#C9A961" stroke-width="0.6"/>
  <circle cx="164" cy="116" r="3" fill="#E5C770" stroke="#C9A961" stroke-width="0.6"/>

  <!-- Cargo containers stacked -->
  <rect x="80" y="78" width="28" height="22" fill="url(#marDeck)" stroke="#0A0A0A" stroke-width="1"/>
  <rect x="84" y="84" width="20" height="6" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.6"/>
  <rect x="84" y="92" width="20" height="6" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.6"/>

  <rect x="112" y="78" width="28" height="22" fill="#C9A961" stroke="#0A0A0A" stroke-width="1"/>
  <rect x="116" y="84" width="20" height="6" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.6"/>
  <rect x="116" y="92" width="20" height="6" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.6"/>

  <rect x="92" y="58" width="34" height="20" fill="#0A0A0A" stroke="#5C4A1D" stroke-width="1"/>
  <rect x="96" y="64" width="26" height="4" fill="none" stroke="#3A3A3A" stroke-width="0.6"/>
  <rect x="96" y="70" width="26" height="4" fill="none" stroke="#3A3A3A" stroke-width="0.6"/>

  <!-- Bridge / cabin -->
  <rect x="142" y="68" width="38" height="32" fill="#1A1A1A" stroke="#5C4A1D" stroke-width="0.8"/>
  <rect x="146" y="74" width="8" height="8" fill="#E5C770"/>
  <rect x="158" y="74" width="8" height="8" fill="#E5C770"/>
  <rect x="170" y="74" width="6" height="8" fill="#E5C770"/>
  <rect x="146" y="86" width="30" height="3" fill="#C9A961"/>

  <!-- Mast/crane -->
  <line x1="140" y1="68" x2="140" y2="40" stroke="#0A0A0A" stroke-width="2.5"/>
  <line x1="140" y1="42" x2="160" y2="42" stroke="#0A0A0A" stroke-width="2"/>
  <line x1="160" y1="42" x2="160" y2="56" stroke="#0A0A0A" stroke-width="1.4"/>
  <rect x="156" y="56" width="8" height="6" fill="#1A1A1A"/>
  <circle cx="140" cy="38" r="2" fill="#D4AF37"/>

  <!-- Flag -->
  <line x1="120" y1="58" x2="120" y2="40" stroke="#0A0A0A" stroke-width="1.4"/>
  <path d="M120 40 L132 44 L120 50 Z" fill="#D4AF37"/>

  <!-- Anchor at front -->
  <g transform="translate(54 116)">
    <line x1="0" y1="-2" x2="0" y2="10" stroke="#0A0A0A" stroke-width="1.6"/>
    <path d="M-5 8 Q0 14 5 8" stroke="#0A0A0A" stroke-width="1.6" fill="none"/>
    <circle cx="0" cy="-3" r="1.6" fill="none" stroke="#0A0A0A" stroke-width="1.4"/>
  </g>

  <!-- Sparkles -->
  <circle cx="22" cy="40" r="2" fill="#D4AF37"/>
  <circle cx="32" cy="68" r="1.4" fill="#E5C770"/>
  <path d="M40 50 L46 50 M43 47 L43 53" stroke="#C9A961" stroke-width="1" stroke-linecap="round"/>
</svg>
